name: Publish aod-sdk to npm

# Fires when a GitHub Release is published with a tag like `aod-sdk-ts-v0.1.0`.
# The server and python SDK ship from the same repo, so we scope by tag prefix.

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'aod-sdk-ts-v')
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@ravi-hq/aod-sdk
    permissions:
      id-token: write   # OIDC for npm Trusted Publishing (also enables provenance)
      contents: read
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm CLI >= 11.5.1; Node 20 ships with 10.x.
      - run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          tag="${{ github.event.release.tag_name }}"
          tag_version="${tag#aod-sdk-ts-v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi

      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
