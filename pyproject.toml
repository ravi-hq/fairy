[project]
name = "fairy"
version = "0.1.0"
description = "API for running AI coding agents on Sprites"
requires-python = ">=3.11"
dependencies = [
    "django>=5.1",
    "django-cors-headers>=4.0",
    "sprites-py>=0.0.1rc37",
    "pydantic>=2.0.0",
    "cryptography>=43.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-django>=4.8.0",
    "pytest-mock>=3.14.0",
    "pytest-xdist>=3.6.0",
    "pytest-cov>=5.0.0",
    "requests>=2.31.0",
    "ruff>=0.8.0",
    "mypy>=1.11",
    "types-requests>=2.31",
    "pip-audit>=2.7",
    "bandit>=1.7",
    "pylint>=3.2",
    "pyyaml>=6.0",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
pythonpath = ["src"]
norecursedirs = ["tests/e2e", ".venv"]
markers = [
    "slow: tests that create real agent sessions (may take minutes)",
    "mcp_matrix: verifies MCP server config reaches each runtime",
]

[tool.coverage.run]
source = ["src/fairy"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "src/fairy/admin.py",
    "src/fairy/apps.py",
    "src/fairy/signals.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]

[tool.mypy]
python_version = "3.11"
files = ["src"]
exclude = [
    "src/fairy/migrations/",
    "src/fairy\\.egg-info/",
]
ignore_missing_imports = true
check_untyped_defs = false
disable_error_code = ["annotation-unchecked", "import-untyped"]
follow_imports = "silent"

[tool.bandit]
exclude_dirs = ["tests", ".venv", "src/fairy/migrations"]
