[project]
name = "fairy"
version = "0.1.0"
description = "API for running AI coding agents on Sprites"
requires-python = ">=3.11"
dependencies = [
    "django>=5.1",
    "django-cors-headers>=4.0",
    "sprites-py>=0.0.1rc37",
    "pydantic>=2.0.0",
    "cryptography>=43.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-django>=4.8.0",
    "pytest-mock>=3.14.0",
    "pytest-xdist>=3.6.0",
    "requests>=2.31.0",
    "ruff>=0.8.0",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
pythonpath = ["src"]
markers = [
    "slow: tests that create real agent sessions (may take minutes)",
    "mcp_matrix: verifies MCP server config reaches each runtime",
]
