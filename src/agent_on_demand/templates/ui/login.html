{% extends "ui/base.html" %}
{% block title %}Log in · Fairy{% endblock %}
{% block content %}
  <div class="auth-card">
    <h1>Log in</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Log in</button>
    </form>
    <p class="auth-footer muted">No account? <a href="{% url 'ui-register' %}">Register</a>.</p>
  </div>
{% endblock %}
