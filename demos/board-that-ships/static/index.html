<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Board That Ships</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c63ff;
      --accent-dim: #3d3880;
      --green: #22c55e;
      --yellow: #eab308;
      --blue: #38bdf8;
      --pink: #f472b6;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --radius: 10px;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header .logo span {
      color: var(--accent);
    }

    header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Main layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Board ── */
    .board {
      display: flex;
      gap: 16px;
      padding: 20px;
      flex: 1;
      overflow-x: auto;
      align-items: flex-start;
    }

    .column {
      display: flex;
      flex-direction: column;
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .column-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-todo .dot    { background: var(--text-muted); }
    .col-progress .dot { background: var(--yellow); }
    .col-review .dot  { background: var(--green); }

    .column-header .count {
      margin-left: auto;
      font-size: 12px;
      background: var(--surface2);
      padding: 1px 7px;
      border-radius: 99px;
      color: var(--text-muted);
    }

    .cards {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 60px;
    }

    /* ── Ticket card ── */
    .card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: default;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
    }

    .card:hover { border-color: var(--accent-dim); }

    .card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .card-id {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-start {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-start:hover { opacity: 0.85; }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .pr-link {
      font-size: 11px;
      color: var(--blue);
      text-decoration: none;
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      display: inline-block;
    }

    .pr-link:hover { text-decoration: underline; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Agent panel ── */
    .agent-panel {
      width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow: hidden;
      transition: width 0.25s;
    }

    .agent-panel.hidden {
      width: 0;
      border: none;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-header .panel-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .panel-header .panel-close:hover {
      color: var(--text);
      background: var(--surface2);
    }

    /* Stages row */
    .stages {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 42px;
    }

    .stage-badge {
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 3px 8px;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
      animation: fadeIn 0.2s ease;
    }

    .stage-badge.done {
      border-color: var(--green);
      color: var(--green);
    }

    .stage-badge.active {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* Terminal output */
    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.7;
      color: #a8b3c4;
      background: #0d0f18;
    }

    .terminal::-webkit-scrollbar { width: 6px; }
    .terminal::-webkit-scrollbar-track { background: transparent; }
    .terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .terminal .line { display: block; white-space: pre-wrap; word-break: break-all; }
    .terminal .line.highlight { color: var(--green); }
    .terminal .line.pr-line { color: var(--blue); }
    .terminal .line.pr-line a { color: var(--blue); text-decoration: underline; }
    .terminal .line.dim { color: var(--text-muted); }

    .terminal .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Panel status bar */
    .panel-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.running { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
    .status-dot.done    { background: var(--green); }
    .status-dot.idle    { background: var(--text-muted); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>

<header>
  <div class="logo">The Board That <span>Ships</span></div>
  <div class="badge">POC</div>
</header>

<div class="workspace">
  <!-- Kanban board -->
  <div class="board">
    <!-- Todo -->
    <div class="column col-todo" id="col-todo">
      <div class="column-header">
        <div class="dot"></div>
        Todo
        <span class="count" id="count-todo">0</span>
      </div>
      <div class="cards" id="cards-todo"></div>
    </div>

    <!-- In Progress -->
    <div class="column col-progress" id="col-progress">
      <div class="column-header">
        <div class="dot"></div>
        In Progress
        <span class="count" id="count-progress">0</span>
      </div>
      <div class="cards" id="cards-progress"></div>
    </div>

    <!-- In Review -->
    <div class="column col-review" id="col-review">
      <div class="column-header">
        <div class="dot"></div>
        In Review
        <span class="count" id="count-review">0</span>
      </div>
      <div class="cards" id="cards-review"></div>
    </div>
  </div>

  <!-- Agent streaming panel (hidden until an agent starts) -->
  <div class="agent-panel hidden" id="agent-panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">Agent</div>
      <button class="panel-close" id="panel-close" title="Close panel">×</button>
    </div>
    <div class="stages" id="stages"></div>
    <div class="terminal" id="terminal"></div>
    <div class="panel-status">
      <div class="status-dot idle" id="status-dot"></div>
      <span id="status-text">Idle</span>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let tickets = {};
let activeTicketId = null;
let activeEventSource = null;

const STAGE_LABELS = {
  create_sprite:    "create sprite",
  provision_setup:  "provision",
  mcp_config:       "mcp config",
  runtime_start:    "runtime start",
};

// ── DOM refs ───────────────────────────────────────────────────────────────
const panelEl      = document.getElementById("agent-panel");
const terminalEl   = document.getElementById("terminal");
const stagesEl     = document.getElementById("stages");
const panelTitle   = document.getElementById("panel-title");
const panelClose   = document.getElementById("panel-close");
const statusDot    = document.getElementById("status-dot");
const statusText   = document.getElementById("status-text");

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch("/api/tickets");
  const list = await res.json();
  list.forEach(t => { tickets[t.id] = t; });
  renderBoard();
}

// ── Rendering ──────────────────────────────────────────────────────────────
function renderBoard() {
  const columns = {
    "todo":        document.getElementById("cards-todo"),
    "in-progress": document.getElementById("cards-progress"),
    "in-review":   document.getElementById("cards-review"),
  };
  const counts = {
    "todo":        document.getElementById("count-todo"),
    "in-progress": document.getElementById("count-progress"),
    "in-review":   document.getElementById("count-review"),
  };

  // Clear
  Object.values(columns).forEach(el => el.innerHTML = "");
  Object.values(counts).forEach(el => el.textContent = "0");

  Object.values(tickets).forEach(t => {
    const col = columns[t.status];
    if (!col) return;
    col.appendChild(buildCard(t));
    counts[t.status].textContent = parseInt(counts[t.status].textContent) + 1;
  });
}

function buildCard(t) {
  const div = document.createElement("div");
  div.className = "card" + (t.id === activeTicketId ? " active" : "");
  div.dataset.id = t.id;

  const isActive = t.id === activeTicketId && t.status === "in-progress";

  div.innerHTML = `
    <div class="card-id">#${t.id.toUpperCase()}</div>
    <div class="card-title">${escHtml(t.title)}</div>
    <div class="card-desc">${escHtml(t.description)}</div>
    <div class="card-footer">
      ${t.status === "todo" ? `
        <button class="btn-start" data-id="${t.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start Agent
        </button>
      ` : ""}
      ${isActive ? `<div class="spinner"></div><span style="font-size:11px;color:var(--text-muted)">Agent running…</span>` : ""}
      ${t.pr_url ? `<a class="pr-link" href="${escHtml(t.pr_url)}" target="_blank" rel="noopener">${escHtml(t.pr_url.replace("https://github.com/", ""))}</a>` : ""}
    </div>
  `;

  div.querySelector(".btn-start")?.addEventListener("click", () => startAgent(t.id));

  // Clicking a card that's already in-progress/review opens the panel
  if (t.id === activeTicketId) {
    div.addEventListener("click", openPanel);
  }

  return div;
}

// ── Agent flow ─────────────────────────────────────────────────────────────
async function startAgent(ticketId) {
  // Move ticket to in-progress
  const res = await fetch(`/api/tickets/${ticketId}/start`, { method: "POST" });
  if (!res.ok) { alert("Could not start agent: " + (await res.text())); return; }
  const ticket = await res.json();
  tickets[ticketId] = ticket;

  // Close existing stream if any
  if (activeEventSource) {
    activeEventSource.close();
    activeEventSource = null;
  }

  activeTicketId = ticketId;
  renderBoard();
  openPanel();
  resetPanel(ticket.title);

  // Open SSE stream
  const es = new EventSource(`/api/tickets/${ticketId}/stream`);
  activeEventSource = es;

  setStatus("running", "Agent running…");

  es.addEventListener("stage", e => {
    const { data } = JSON.parse(e.data);
    addStage(data);
  });

  es.addEventListener("output", e => {
    const { data } = JSON.parse(e.data);
    appendOutput(data);
  });

  es.addEventListener("state_change", e => {
    const { ticket: updated } = JSON.parse(e.data);
    tickets[ticketId] = updated;
    renderBoard();
  });

  es.addEventListener("exit", e => {
    const { data } = JSON.parse(e.data);
    es.close();
    activeEventSource = null;
    removeCursor();
    if (data === "0") {
      setStatus("done", "Agent finished — PR opened");
    } else {
      setStatus("idle", `Agent exited (code ${data})`);
    }
    // Re-render to remove spinner from card
    renderBoard();
  });

  es.onerror = () => {
    es.close();
    activeEventSource = null;
    setStatus("idle", "Stream error");
    removeCursor();
  };
}

// ── Panel helpers ──────────────────────────────────────────────────────────
function openPanel() {
  panelEl.classList.remove("hidden");
}

function resetPanel(title) {
  panelTitle.textContent = `Agent · ${title}`;
  stagesEl.innerHTML = "";
  terminalEl.innerHTML = '<span class="cursor" id="cursor"></span>';
}

function addStage(stageKey) {
  // Mark previous badge as done
  const prev = stagesEl.querySelector(".stage-badge.active");
  if (prev) { prev.classList.remove("active"); prev.classList.add("done"); prev.querySelector(".icon").textContent = "✓"; }

  const badge = document.createElement("div");
  badge.className = "stage-badge active";
  badge.innerHTML = `<span class="icon">⚙</span> ${STAGE_LABELS[stageKey] || stageKey}`;
  stagesEl.appendChild(badge);
}

function appendOutput(line) {
  const cursor = document.getElementById("cursor");
  const span = document.createElement("span");
  span.className = "line";

  const trimmed = line.trim();

  if (trimmed.startsWith("PR opened:")) {
    span.classList.add("pr-line");
    const url = trimmed.replace("PR opened:", "").trim();
    span.innerHTML = `PR opened: <a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(url)}</a>\n`;
  } else if (trimmed.startsWith("All ") && trimmed.includes("passing")) {
    span.classList.add("highlight");
    span.textContent = line;
  } else if (trimmed.startsWith("Reading ticket:") || trimmed.startsWith("Writing")) {
    span.style.color = "var(--text-dim)";
    span.textContent = line;
  } else {
    span.textContent = line;
  }

  // Insert before cursor
  if (cursor) {
    terminalEl.insertBefore(span, cursor);
  } else {
    terminalEl.appendChild(span);
  }

  // Mark last stage badge done when output starts
  const activeBadge = stagesEl.querySelector(".stage-badge.active");
  if (activeBadge) { activeBadge.classList.remove("active"); activeBadge.classList.add("done"); activeBadge.querySelector(".icon").textContent = "✓"; }

  terminalEl.scrollTop = terminalEl.scrollHeight;
}

function removeCursor() {
  const cursor = document.getElementById("cursor");
  if (cursor) cursor.remove();
}

function setStatus(state, text) {
  statusDot.className = `status-dot ${state}`;
  statusText.textContent = text;
}

// ── Close panel ────────────────────────────────────────────────────────────
panelClose.addEventListener("click", () => {
  panelEl.classList.add("hidden");
});

// ── Utils ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
