projects:
  - name: agent-on-demand
    environments:
      - name: production
        databases:
          - name: agent-on-demand-db
            plan: standard-1gb
            databaseName: agent_on_demand
            postgresMajorVersion: "16"

        services:
          - type: web
            name: agent-on-demand-api
            runtime: python
            plan: starter
            buildCommand: pip install uv && uv sync && uv run python manage.py collectstatic --noinput
            preDeployCommand: uv run python manage.py migrate --noinput
            startCommand: >-
              uv run uvicorn config.asgi:application
              --host 0.0.0.0
              --port $PORT
              --workers 3
              --timeout-graceful-shutdown 650
            healthCheckPath: /health
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: agent-on-demand-db
                  property: connectionString
              - key: DJANGO_SECRET_KEY
                generateValue: true
              - key: FIELD_ENCRYPTION_KEY
                generateValue: true
              - key: DJANGO_DEBUG
                value: "false"
              - key: DJANGO_ALLOWED_HOSTS
                value: aod.ravi.id,agent-on-demand-api.onrender.com
              - key: PYTHON_VERSION
                value: "3.11.9"
              - key: OTEL_SERVICE_NAME
                value: aod-web
              - key: HONEYCOMB_API_KEY
                sync: false
              - key: POSTHOG_API_KEY
                sync: false
              - key: POSTHOG_HOST
                value: https://us.i.posthog.com

          - type: worker
            name: agent-on-demand-worker
            runtime: python
            plan: starter
            buildCommand: pip install uv && uv sync
            startCommand: >-
              uv run python manage.py procrastinate worker
              --concurrency 4
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: agent-on-demand-db
                  property: connectionString
              - key: DJANGO_SECRET_KEY
                fromService:
                  name: agent-on-demand-api
                  type: web
                  envVarKey: DJANGO_SECRET_KEY
              - key: FIELD_ENCRYPTION_KEY
                fromService:
                  name: agent-on-demand-api
                  type: web
                  envVarKey: FIELD_ENCRYPTION_KEY
              - key: DJANGO_DEBUG
                value: "false"
              - key: DJANGO_ALLOWED_HOSTS
                value: aod.ravi.id,agent-on-demand-api.onrender.com
              - key: PYTHON_VERSION
                value: "3.11.9"
              - key: OTEL_SERVICE_NAME
                value: aod-worker
              - key: HONEYCOMB_API_KEY
                fromService:
                  name: agent-on-demand-api
                  type: web
                  envVarKey: HONEYCOMB_API_KEY
              - key: POSTHOG_API_KEY
                fromService:
                  name: agent-on-demand-api
                  type: web
                  envVarKey: POSTHOG_API_KEY
              - key: POSTHOG_HOST
                value: https://us.i.posthog.com
