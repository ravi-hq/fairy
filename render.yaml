projects:
  - name: agent-on-demand
    environments:
      - name: production
        databases:
          - name: agent-on-demand-db
            plan: basic-256mb
            databaseName: agent_on_demand
            postgresMajorVersion: "16"

        services:
          - type: web
            name: agent-on-demand-api
            runtime: python
            plan: starter
            buildCommand: pip install uv && uv sync
            preDeployCommand: uv run python manage.py migrate --noinput
            startCommand: uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
            healthCheckPath: /health
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: agent-on-demand-db
                  property: connectionString
              - key: DJANGO_SECRET_KEY
                generateValue: true
              - key: DJANGO_DEBUG
                value: "false"
              - key: DJANGO_ALLOWED_HOSTS
                value: aod.ravi.id,agent-on-demand-api.onrender.com
              - key: PYTHON_VERSION
                value: "3.11.9"
