openapi: 3.1.0
info:
  title: Agent on Demand API
  version: "0.1.0"
  description: |
    Agent on Demand runs AI coding agents on Sprites. It manages three
    resources: agents, environments, and sessions. See docs/API.md for the full
    operator guide.

servers:
  - url: http://localhost:8777
    description: Local dev
  - url: https://aod.example
    description: Production (replace with your deployment)

security:
  - bearerAuth: []

tags:
  - name: health
  - name: agents
  - name: environments
  - name: sessions

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /agents:
    get:
      tags: [agents]
      summary: List non-archived agents
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
    post:
      tags: [agents]
      summary: Create an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agent_id}:
    parameters:
      - $ref: "#/components/parameters/AgentId"
    get:
      tags: [agents]
      summary: Get an agent
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [agents]
      summary: Update an agent (optimistic concurrency)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agent_id}/archive:
    parameters:
      - $ref: "#/components/parameters/AgentId"
    post:
      tags: [agents]
      summary: Archive an agent
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /agents/{agent_id}/versions:
    parameters:
      - $ref: "#/components/parameters/AgentId"
    get:
      tags: [agents]
      summary: List version history for an agent
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /environments:
    get:
      tags: [environments]
      summary: List non-archived environments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Environment"
    post:
      tags: [environments]
      summary: Create an environment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvironmentCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /environments/{environment_id}:
    parameters:
      - $ref: "#/components/parameters/EnvironmentId"
    get:
      tags: [environments]
      summary: Get an environment
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [environments]
      summary: Update an environment (optimistic concurrency)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvironmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /environments/{environment_id}/archive:
    parameters:
      - $ref: "#/components/parameters/EnvironmentId"
    post:
      tags: [environments]
      summary: Archive an environment
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /environments/{environment_id}/delete:
    parameters:
      - $ref: "#/components/parameters/EnvironmentId"
    delete:
      tags: [environments]
      summary: Hard-delete an environment
      description: >
        Returns 409 if any session (active or historical) still references
        this environment. Archive it instead if you need to preserve history.
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailMessage"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /environments/{environment_id}/versions:
    parameters:
      - $ref: "#/components/parameters/EnvironmentId"
    get:
      tags: [environments]
      summary: List version history for an environment
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EnvironmentVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions:
    get:
      tags: [sessions]
      summary: List sessions owned by the caller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
    post:
      tags: [sessions]
      summary: Create a session and start running it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCreate"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionCreateAck"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          description: Per-user concurrent session limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConcurrencyLimitError"

  /sessions/{session_id}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [sessions]
      summary: Get a session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{session_id}/prompt:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [sessions]
      summary: Resume a non-running session with a new prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionPromptRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionPromptAck"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sessions/{session_id}/turns:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [sessions]
      summary: List turns for a session
      description: Returns the full turn history ordered by turn_number.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionTurn"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{session_id}/terminate:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [sessions]
      summary: Terminate a running session
      responses:
        "200":
          description: Terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTerminateAck"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /sessions/{session_id}/delete:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    delete:
      tags: [sessions]
      summary: Delete a session row
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailMessage"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /sessions/{session_id}/stream:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [sessions]
      summary: Server-sent events stream of session output
      description: >
        Streams session output as Server-Sent Events. Event types: `start`,
        `turn_start`, `output`, `stage`, `exit`, `error`, `terminated`,
        `stale`. Every event except `start` includes an `"id"` field in its
        JSON payload and an SSE `id:` line. Clients can resume a disconnected
        stream via the `Last-Event-ID` header or the `since` query parameter.
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: "Resume after this event id. Omit for full replay."
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
            pattern: '^\d+$'
          description: >
            Standard SSE resume header. The HTML Living Standard defines
            `Last-Event-ID` as an opaque string echoed back verbatim by
            `EventSource`; this server emits and accepts it as a decimal
            non-negative integer encoded as a string. Equivalent to
            `since`. If both are present, `Last-Event-ID` wins.
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request (e.g. since is not a non-negative integer)
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: aod_<token>

  parameters:
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentId:
      name: environment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Pydantic validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: array
                items:
                  type: object

  schemas:
    Error:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                type: object

    DetailMessage:
      type: object
      properties:
        detail:
          type: string

    ConcurrencyLimitError:
      type: object
      properties:
        detail:
          type: string
        limit:
          type: integer
        active:
          type: integer

    Networking:
      type: object
      description: >
        `type` gates egress from the Sprite. For `limited`, `allowed_hosts` is
        an allow-list of hostnames reachable from inside the Sprite. `type`
        is optional on requests and defaults to `unrestricted` server-side.
      properties:
        type:
          type: string
          enum: [unrestricted, limited]
          default: unrestricted
        allowed_hosts:
          type: array
          items:
            type: string

    Packages:
      type: object
      description: >
        Packages to install during environment provisioning, keyed by package
        manager. Known managers: `apt`, `cargo`, `gem`, `go`, `npm`, `pip`.
      additionalProperties:
        type: array
        items:
          type: string

    McpServer:
      type: object
      description: >
        MCP server config. `type=url` requires `url` (and optionally accepts
        `headers`); `type=stdio` requires `command` (and optionally accepts
        `args` and `env`). Names must be unique within the agent. Maximum 20
        per agent.
      properties:
        name:
          type: string
        type:
          type: string
          enum: [url, stdio]
        url:
          type: string
          description: Required when type is `url`.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional request headers when type is `url`.
        command:
          type: string
          description: Required when type is `stdio`.
        args:
          type: array
          items:
            type: string
          description: Optional argv when type is `stdio`.
        env:
          type: object
          additionalProperties:
            type: string
          description: Optional environment overrides when type is `stdio`.
      required: [name, type]

    Skill:
      type: object
      description: >
        A skill definition. Two shapes are accepted; presence of `type`
        discriminates:

        Inline (default — omit `type`): {name, description, content}. The
        full SKILL.md text is shipped in `content` and is written directly
        onto the Sprite at `<runtime-skills-root>/<name>/SKILL.md`. Subject
        to MAX_SKILL_CONTENT_BYTES. `name` is required.

        GitHub reference (type: "github"): {type, description, source, name?}.
        `source` is `owner/repo`. At session-provision time the Sprite runs
        `npx -y skills@latest add <source> --global --agent <runtime-agent>
        --yes` (the [skills.sh](https://skills.sh) CLI). When `name` is set,
        `--skill <name>` is appended so only that one SKILL.md from the repo
        is installed; omit `name` to install every skill the repo exposes.
        For `networking_type: "limited"` Environments, the allowed-hosts
        list must include `registry.npmjs.org`, `github.com`, and
        `codeload.github.com`.
      additionalProperties: true
      properties:
        type:
          type: string
          enum: [github]
          description: Omit for inline skills; "github" for github references.
        name:
          type: string
          description: >
            Directory slug. Matches [a-z0-9][a-z0-9-]{0,63}. Required for
            inline skills. Optional for github skills — present means
            "install only this skill from the repo"; absent means "install
            every skill the repo exposes".
        description:
          type: string
          description: Up to 1024 chars.
        content:
          type: string
          description: Inline SKILL.md text. Required for inline skills, ignored for github skills.
        source:
          type: string
          description: GitHub "owner/repo". Required for github skills.

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [agent]
        name:
          type: string
        description:
          type: string
          nullable: true
        system:
          type: string
          nullable: true
          description: System prompt prepended to first-turn user prompts.
        model:
          type: string
        runtime:
          type: string
        environment_id:
          type: string
          format: uuid
          nullable: true
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/McpServer"
        metadata:
          type: object
          additionalProperties: true
        version:
          type: integer
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentCreate:
      type: object
      required: [name, model, runtime]
      properties:
        name:
          type: string
          maxLength: 200
        model:
          type: string
          maxLength: 100
          description: Must match one of the known `AgentModel` values.
        runtime:
          type: string
          maxLength: 32
        system:
          type: string
          default: ""
        description:
          type: string
          default: ""
        environment_id:
          type: string
          format: uuid
          nullable: true
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
          description: Maximum 20 per agent.
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/McpServer"
          description: Maximum 20 per agent.
        metadata:
          type: object
          additionalProperties: true

    AgentUpdate:
      type: object
      required: [version]
      properties:
        version:
          type: integer
          description: Current version — optimistic concurrency check.
        name:
          type: string
        model:
          type: string
        runtime:
          type: string
        system:
          type: string
        description:
          type: string
        environment_id:
          type: string
          format: uuid
          nullable: true
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/McpServer"
        metadata:
          type: object
          additionalProperties: true
          description: >
            Merged onto existing metadata at the key level. Pass `{"k": ""}` to
            delete the key `k`; other keys in the payload are upserted.

    AgentVersion:
      type: object
      description: >
        Historical snapshot of an agent at a specific `version`. The `id`
        field is the owning agent's id, not a version-specific id.
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [agent]
        name:
          type: string
        description:
          type: string
          nullable: true
        system:
          type: string
          nullable: true
        model:
          type: string
        runtime:
          type: string
        environment_id:
          type: string
          format: uuid
          nullable: true
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/McpServer"
        metadata:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time

    Environment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [environment]
        name:
          type: string
        packages:
          $ref: "#/components/schemas/Packages"
        setup_script:
          type: string
          nullable: true
          description: Shell script executed during Sprite provisioning.
        networking:
          $ref: "#/components/schemas/Networking"
        version:
          type: integer
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EnvironmentCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
        packages:
          $ref: "#/components/schemas/Packages"
        env_vars:
          type: object
          description: >
            Encrypted at rest; never returned in responses. Unlike `metadata`,
            an `env_vars` payload on PUT *fully replaces* the existing map —
            it does not merge per-key. Empty-string values are stored as-is
            (the variable is exported with an empty value); to remove a key,
            omit it from the payload.
          additionalProperties:
            type: string
        setup_script:
          type: string
        networking:
          $ref: "#/components/schemas/Networking"

    EnvironmentUpdate:
      type: object
      required: [version]
      properties:
        version:
          type: integer
          description: Current version — optimistic concurrency check.
        name:
          type: string
        packages:
          $ref: "#/components/schemas/Packages"
        env_vars:
          type: object
          description: >
            Encrypted at rest; never returned in responses. A PUT *fully
            replaces* the existing map — it does not merge per-key.
            Empty-string values are stored as-is (the variable is exported
            with an empty value); to remove a key, omit it from the payload.
          additionalProperties:
            type: string
        setup_script:
          type: string
        networking:
          $ref: "#/components/schemas/Networking"

    EnvironmentVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [environment]
        name:
          type: string
        packages:
          $ref: "#/components/schemas/Packages"
        setup_script:
          type: string
          nullable: true
        networking:
          $ref: "#/components/schemas/Networking"
        version:
          type: integer
        created_at:
          type: string
          format: date-time

    SessionResource:
      type: object
      description: >
        A GitHub repository cloned into the Sprite for the session. Tokens
        supplied on creation are NOT returned on any response.
      properties:
        type:
          type: string
          enum: [github_repository]
        url:
          type: string
          description: HTTPS GitHub repo URL.
        mount_path:
          type: string
          nullable: true
          description: Absolute path inside the workspace. Defaults to /workspace/<repo>.

    GitHubRepoResourceInput:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [github_repository]
        url:
          type: string
        mount_path:
          type: string
          nullable: true
        authorization_token:
          type: string
          nullable: true
          description: GitHub PAT for private repos; encrypted at rest, never echoed back.

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
          nullable: true
        environment_id:
          type: string
          format: uuid
          nullable: true
        runtime:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, terminated]
        exit_code:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        resources:
          type: array
          items:
            $ref: "#/components/schemas/SessionResource"
        turn_count:
          type: integer
        current_turn:
          type: integer
          nullable: true

    SessionTurn:
      type: object
      properties:
        turn_number:
          type: integer
        prompt:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        exit_code:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true

    SessionCreate:
      type: object
      required: [agent_id, prompt]
      properties:
        agent_id:
          type: string
          format: uuid
        prompt:
          type: string
        timeout:
          type: integer
          minimum: 10
          maximum: 3600
          default: 600
          description: Per-turn timeout in seconds.
        environment_id:
          type: string
          format: uuid
          nullable: true
          description: Overrides the agent's default environment when set.
        resources:
          type: array
          description: >
            GitHub repositories to clone into the session. Max 10 per session;
            `mount_path`s must be unique.
          items:
            $ref: "#/components/schemas/GitHubRepoResourceInput"

    SessionCreateAck:
      type: object
      description: >
        Trimmed ack returned by `POST /sessions`. Fetch the full `Session`
        via `GET /sessions/{id}`.
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending]
        stream_url:
          type: string
        environment_id:
          type: string
          format: uuid
          nullable: true
        resources:
          type: array
          items:
            $ref: "#/components/schemas/SessionResource"
        current_turn:
          type: integer

    SessionPromptRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        timeout:
          type: integer
          minimum: 10
          maximum: 3600
          default: 600

    SessionPromptAck:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending]
        stream_url:
          type: string
        current_turn:
          type: integer

    SessionTerminateAck:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [terminated]
